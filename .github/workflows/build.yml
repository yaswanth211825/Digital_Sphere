name: Build & Release APK

on:
  # Auto-build on every push to main (verifies code compiles)
  push:
    branches: [ main ]
    # Create a GitHub Release with signed APK when you push a version tag
    # Usage: git tag v1.0 && git push origin v1.0
    tags:
      - 'v*'

jobs:
  # ─── Job 1: Build debug APK on every commit ──────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # google-services.json is gitignored (contains API key).
      # Store its content as a GitHub Secret named GOOGLE_SERVICES_JSON.
      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigitalSphere-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─── Job 2: Build signed release APK + publish GitHub Release ────────────
  release:
    name: Release Signed APK
    runs-on: ubuntu-latest
    # Only runs when you push a version tag (e.g. v1.0, v2.3.1)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Restore gitignored google-services.json from GitHub Secret
      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      - name: Build release APK
        run: ./gradlew assembleRelease

      # Decode the keystore from the GitHub Secret and write it to disk
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      # Sign the APK using your keystore credentials stored in GitHub Secrets
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # Rename APK to include the version tag (e.g. DigitalSphere-v1.0.apk)
      - name: Rename APK
        run: |
          VERSION=${{ github.ref_name }}
          cp ${{ steps.sign_app.outputs.signedReleaseFile }} \
             app/build/outputs/apk/release/DigitalSphere-${VERSION}.apk

      # Create a GitHub Release and attach the APK — anyone can download it
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Digital Sphere ${{ github.ref_name }}"
          body: |
            ## Digital Sphere ${{ github.ref_name }}

            ### Install on Android
            1. Download `DigitalSphere-${{ github.ref_name }}.apk` below
            2. Open the file on your Android phone
            3. If prompted, allow **Install unknown apps** for your browser/Files app
            4. Tap Install

            > Requires Android 8.0+ and Bluetooth Low Energy support.
          files: app/build/outputs/apk/release/DigitalSphere-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
